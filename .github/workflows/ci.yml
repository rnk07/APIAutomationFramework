
name: API Test Automation Workflow

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        type: choice
        options:
          - qa
          - dev
          - uat
        default: qa
        required: true
      suiteXmlFile: 
        description: "TestNg Xml File"
        type: choice
        options:
          - testng.xml
          - testng-datadriven.xml
        default: testng.xml
        required: true
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule: 
    - cron: "00 02 * * 5"

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Execution Test Automation Framework
      run: mvn test -DsuiteXmlFile="${{ github.event.inputs.suiteXmlFile || 'testng.xml' }}" -Denv="${{ github.event.inputs.env || 'qa' }}"

    - name: Upload a Build Artifact
      if: always()
      uses: actions/upload-artifact@v5.0.0
      with:
        name: SureFire Report
        path: target/surefire-reports/
        retention-days: 10
        
